<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamilton - Gestão Financeira Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .active { display: block; }
        .tab-btn.active-btn { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div id="login-screen" class="fixed inset-0 bg-black flex items-center justify-center z-50">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-80 text-center">
            <h2 class="text-xl font-bold mb-6 text-blue-400">Hamilton Junior</h2>
            <input type="password" id="senha" class="w-full p-3 bg-slate-700 rounded-lg mb-4 text-center border border-slate-600 outline-none font-mono" placeholder="Senha">
            <button onclick="login()" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition shadow-lg text-white">Entrar no Sistema</button>
        </div>
    </div>

    <div id="main-content" class="hidden max-w-xl mx-auto p-4 pb-24">
        
        <header class="py-4 border-b border-slate-800 sticky top-0 bg-slate-900 z-10">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold text-blue-400">Extrato Consolidado</h1>
                <input type="month" id="filtro-mes" onchange="trocarMes()" class="bg-slate-800 p-2 rounded-lg text-sm font-bold border border-slate-700 outline-none">
            </div>
            
            <div class="grid grid-cols-3 gap-2 text-center">
                <div class="bg-slate-800 p-2 rounded-lg border-b-2 border-emerald-500">
                    <p class="text-[8px] uppercase text-slate-400">Entradas Mês</p>
                    <p id="top-ganhos" class="text-xs font-mono font-bold text-emerald-400">0,00 €</p>
                </div>
                <div class="bg-slate-800 p-2 rounded-lg border-b-2 border-red-500">
                    <p class="text-[8px] uppercase text-slate-400">Saídas Mês</p>
                    <p id="top-gastos" class="text-xs font-mono font-bold text-red-400">0,00 €</p>
                </div>
                <div id="top-card-saldo" class="bg-slate-800 p-2 rounded-lg border-b-2 transition-all">
                    <p class="text-[8px] uppercase text-slate-400">Saldo Geral</p>
                    <p id="top-saldo" class="text-xs font-mono font-bold">0,00 €</p>
                </div>
            </div>
        </header>

        <nav class="flex justify-between border-b border-slate-700 my-6 text-[10px] uppercase font-bold tracking-widest overflow-x-auto gap-4">
            <button onclick="showTab('pearson')" class="tab-btn active-btn pb-2 px-1">Pearson</button>
            <button onclick="showTab('rendas')" class="tab-btn pb-2 px-1">Gamil/Vôlei/Extras</button>
            <button onclick="showTab('gastos')" class="tab-btn pb-2 px-1">Despesas</button>
            <button onclick="showTab('resumo')" class="tab-btn pb-2 px-1">Balanço</button>
        </nav>

        <section id="pearson" class="tab-content active">
            <div class="bg-slate-800 p-5 rounded-2xl mb-6 border border-slate-700 shadow-xl">
                <div class="grid grid-cols-2 gap-3 mb-4 text-xs">
                    <div>
                        <label class="block text-slate-400 mb-1">Data Trabalho:</label>
                        <input type="date" id="p-data" class="bg-slate-700 p-2 rounded-lg w-full border border-slate-600 outline-none">
                    </div>
                    <div>
                        <label class="block text-slate-400 mb-1">Horas Feitas:</label>
                        <input type="number" id="p-horas" step="0.5" placeholder="ex: 4.5" class="bg-slate-700 p-2 rounded-lg w-full border border-slate-600 outline-none font-mono">
                    </div>
                </div>
                <button onclick="salvarPearson()" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition">Registar no Ponto</button>
            </div>
            <div id="lista-ponto" class="space-y-2"></div>
        </section>

        <section id="rendas" class="tab-content">
            <div class="bg-slate-800 p-5 rounded-2xl space-y-6 border border-slate-700 shadow-xl">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] uppercase text-slate-400 font-bold">Gamil</label>
                        <input type="number" id="in-gamil" onblur="salvarRendaFixa()" class="w-full bg-slate-700 p-3 rounded-lg border border-slate-600 font-mono text-blue-400 outline-none" placeholder="0,00">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase text-slate-400 font-bold">Vôlei</label>
                        <input type="number" id="in-volei" onblur="salvarRendaFixa()" class="w-full bg-slate-700 p-3 rounded-lg border border-slate-600 font-mono text-orange-400 outline-none" placeholder="0,00">
                    </div>
                </div>
                <div class="border-t border-slate-700 pt-4">
                    <label class="text-[10px] uppercase block mb-2 font-bold text-green-400 tracking-wider">Adicionar Ganhos Extras</label>
                    <input type="text" id="extra-desc" placeholder="Descrição (ex: Vídeo Restaurante)" class="w-full bg-slate-700 p-3 rounded-lg border border-slate-600 mb-2 text-sm outline-none">
                    <div class="flex gap-2">
                        <input type="number" id="extra-val" class="flex-1 bg-slate-700 p-3 rounded-lg border border-slate-600 font-mono outline-none" placeholder="Valor €">
                        <button onclick="addExtra()" class="bg-green-600 px-6 rounded-lg font-bold text-xl hover:bg-green-500 transition">+</button>
                    </div>
                </div>
                <div id="lista-extras" class="space-y-2 pt-2"></div>
                <div class="border-t border-slate-700 pt-4 text-center">
                    <label class="text-[10px] uppercase text-slate-500">Configuração Valor/Hora Pearson</label>
                    <input type="number" id="cfg-vh" onchange="atualizarVH()" class="bg-transparent border-none text-green-400 font-bold text-xl text-center w-full" step="0.01">
                </div>
            </div>
        </section>

        <section id="gastos" class="tab-content">
            <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-xl">
                <div class="flex flex-col gap-3 mb-6">
                    <input type="text" id="g-desc" placeholder="Descrição da Despesa" class="bg-slate-700 p-3 rounded-lg border border-slate-600 text-sm outline-none">
                    <div class="flex gap-2">
                        <input type="number" id="g-val" placeholder="Valor €" class="flex-1 bg-slate-700 p-3 rounded-lg border border-slate-600 font-mono outline-none">
                        <button onclick="addGasto()" class="bg-red-600 px-6 rounded-lg font-bold hover:bg-red-500 transition">Add</button>
                    </div>
                </div>
                <div id="lista-gastos" class="space-y-2"></div>
            </div>
        </section>

        <section id="resumo" class="tab-content">
            <div class="space-y-4">
                <div class="bg-slate-800 p-6 rounded-2xl border-l-8 border-yellow-500 shadow-lg">
                    <p class="text-[10px] text-yellow-500 uppercase font-bold tracking-widest">Reserva para Dízimo (10%)</p>
                    <h2 id="res-dizimo" class="text-3xl font-mono font-bold mt-2 text-yellow-500">0,00 €</h2>
                </div>
                <div class="bg-slate-800 p-6 rounded-2xl border-l-8 border-slate-500 shadow-lg opacity-80">
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Trânsito de Meses Anteriores</p>
                    <h2 id="res-anterior" class="text-xl font-mono font-bold mt-2 text-slate-300">0,00 €</h2>
                </div>
                <p class="text-[9px] text-slate-600 italic text-center leading-relaxed">O saldo geral no topo reflete o que tens realmente disponível, carregando o histórico anterior.</p>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, deleteDoc, doc, setDoc, getDoc, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA7nFxZzTDpLLGZZPmey_kt5Y_AYrWBgt8",
            authDomain: "balanco-3160d.firebaseapp.com",
            projectId: "balanco-3160d",
            storageBucket: "balanco-3160d.firebasestorage.app",
            messagingSenderId: "191125931303",
            appId: "1:191125931303:web:4b1615a83d648c96151502"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.login = () => {
            if(document.getElementById('senha').value === 'hamilton2026') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                const agora = new Date();
                document.getElementById('filtro-mes').value = agora.toISOString().substring(0, 7);
                trocarMes();
            }
        };

        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-btn'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active-btn');
        };

        let unsubs = [];
        window.trocarMes = async () => {
            unsubs.forEach(u => u()); unsubs = [];
            const mesAtual = document.getElementById('filtro-mes').value;
            await calcularSaldoAcumulado(mesAtual);
            carregarDados(mesAtual);
        };

        const fmt = (v) => new Intl.NumberFormat('pt-PT', { style: 'currency', currency: 'EUR' }).format(v);

        async function calcularSaldoAcumulado(mesFiltro) {
            const vh = parseFloat(localStorage.getItem('vh')) || 15.75;
            let brutoAcumulado = 0;
            let gastosAcumulados = 0;

            // Busca histórico total ANTES do mês atual para o carry-over
            const rS = await getDocs(collection(db, "rendas_fixas"));
            rS.forEach(d => { if(d.id < mesFiltro) brutoAcumulado += (d.data().gamil + d.data().volei); });

            const pS = await getDocs(collection(db, "pearson"));
            pS.forEach(d => { if(d.data().mesRef < mesFiltro) brutoAcumulado += (d.data().horas * vh); });

            const eS = await getDocs(collection(db, "extras"));
            eS.forEach(d => { if(d.data().mesRef < mesFiltro) brutoAcumulado += d.data().valor; });

            const gS = await getDocs(collection(db, "gastos"));
            gS.forEach(d => { if(d.data().mesRef < mesFiltro) gastosAcumulados += d.data().val; });

            // Saldo líquido acumulado descontando o dízimo proporcional do passado
            window.saldoAnterior = (brutoAcumulado * 0.90) - gastosAcumulados;
            document.getElementById('res-anterior').innerText = fmt(window.saldoAnterior);
        }

        window.salvarPearson = async () => {
            const dStr = document.getElementById('p-data').value;
            const h = parseFloat(document.getElementById('p-horas').value);
            if(!dStr || isNaN(h)) return alert("Preencha data e horas.");
            const d = new Date(dStr);
            const dia = d.getUTCDate();
            let mR = d.getUTCMonth(); let aR = d.getUTCFullYear();
            
            // Regra: se trabalhou a partir do dia 11, o dinheiro só cai no mês seguinte
            if (dia >= 11) mR += 1;
            if (mR > 11) { mR = 0; aR += 1; }
            const mesRef = `${aR}-${String(mR + 1).padStart(2, '0')}`;
            
            await addDoc(collection(db, "pearson"), { 
                dataTrab: dStr, 
                horas: h, 
                mesRef: mesRef, 
                timestamp: new Date().getTime() 
            });
            document.getElementById('p-horas').value = '';
        };

        window.salvarRendaFixa = async () => {
            const mes = document.getElementById('filtro-mes').value;
            const gamil = parseFloat(document.getElementById('in-gamil').value) || 0;
            const volei = parseFloat(document.getElementById('in-volei').value) || 0;
            await setDoc(doc(db, "rendas_fixas", mes), { gamil, volei });
            calcularTudo();
        };

        window.addExtra = async () => {
            const mes = document.getElementById('filtro-mes').value;
            const desc = document.getElementById('extra-desc').value;
            const val = parseFloat(document.getElementById('extra-val').value);
            if(isNaN(val)) return alert("Coloque um valor.");
            await addDoc(collection(db, "extras"), { desc: desc || "Ganho Extra", valor: val, mesRef: mes });
            document.getElementById('extra-desc').value = '';
            document.getElementById('extra-val').value = '';
        };

        window.addGasto = async () => {
            const mes = document.getElementById('filtro-mes').value;
            const desc = document.getElementById('g-desc').value;
            const val = parseFloat(document.getElementById('g-val').value);
            if(!desc || isNaN(val)) return alert("Preencha descrição e valor.");
            await addDoc(collection(db, "gastos"), { desc, val, mesRef: mes });
            document.getElementById('g-desc').value = '';
            document.getElementById('g-val').value = '';
        };

        window.remover = async (col, id) => { 
            if(confirm("Tem certeza que deseja apagar este registo?")) await deleteDoc(doc(db, col, id)); 
        };

        window.atualizarVH = () => { 
            localStorage.setItem('vh', document.getElementById('cfg-vh').value); 
            trocarMes(); 
        };

        function carregarDados(mes) {
            const vh = parseFloat(localStorage.getItem('vh')) || 15.75;
            document.getElementById('cfg-vh').value = vh;

            getDoc(doc(db, "rendas_fixas", mes)).then(s => {
                document.getElementById('in-gamil').value = s.exists() ? s.data().gamil : 0;
                document.getElementById('in-volei').value = s.exists() ? s.data().volei : 0;
                calcularTudo();
            });

            // Listeners Real-time
            unsubs.push(onSnapshot(query(collection(db, "pearson"), where("mesRef", "==", mes)), (snap) => {
                let html = '', total = 0;
                snap.forEach(d => { 
                    const data = d.data();
                    const sub = data.horas * vh;
                    total += sub; 
                    html += `
                    <div class="bg-slate-800 p-3 rounded-xl flex justify-between items-center border border-slate-700 shadow-sm">
                        <div class="text-[10px] uppercase font-bold text-slate-500">
                            Trab: ${data.dataTrab} <br> 
                            <span class="text-blue-400 text-xs">${data.horas}h registadas</span>
                        </div>
                        <div class="flex gap-4 items-center">
                            <span class="font-mono text-emerald-400 font-bold">${fmt(sub)}</span>
                            <button onclick="remover('pearson','${d.id}')" class="text-slate-600 hover:text-red-500 transition">✕</button>
                        </div>
                    </div>`;
                });
                document.getElementById('lista-ponto').innerHTML = html || '<p class="text-center text-slate-600 text-[10px] py-4">Sem horas previstas para cair neste mês.</p>';
                window.totalP = total; calcularTudo();
            }));

            unsubs.push(onSnapshot(query(collection(db, "extras"), where("mesRef", "==", mes)), (snap) => {
                let html = '', total = 0;
                snap.forEach(d => {
                    const data = d.data();
                    total += data.valor;
                    html += `
                    <div class="bg-slate-900/50 p-3 rounded-lg flex justify-between items-center text-xs">
                        <span class="text-blue-300">${data.desc}</span>
                        <div class="flex gap-3 items-center">
                            <span class="font-mono font-bold">${fmt(data.valor)}</span>
                            <button onclick="remover('extras','${d.id}')" class="text-slate-600">✕</button>
                        </div>
                    </div>`;
                });
                document.getElementById('lista-extras').innerHTML = html;
                window.totalE = total; calcularTudo();
            }));

            unsubs.push(onSnapshot(query(collection(db, "gastos"), where("mesRef", "==", mes)), (snap) => {
                let html = '', total = 0;
                snap.forEach(d => {
                    const data = d.data();
                    total += data.val;
                    html += `
                    <div class="bg-slate-700/30 p-3 rounded-lg flex justify-between items-center text-xs">
                        <span class="font-bold text-slate-200 uppercase tracking-tighter">${data.desc}</span>
                        <div class="flex gap-3 items-center">
                            <span class="text-red-400 font-mono font-bold">${fmt(data.val)}</span>
                            <button onclick="remover('gastos','${d.id}')" class="text-slate-500">✕</button>
                        </div>
                    </div>`;
                });
                document.getElementById('lista-gastos').innerHTML = html || '<p class="text-center text-slate-600 text-xs italic py-4">Sem despesas registadas.</p>';
                window.totalG = total; calcularTudo();
            }));
        }

        function calcularTudo() {
            const gamil = parseFloat(document.getElementById('in-gamil').value) || 0;
            const volei = parseFloat(document.getElementById('in-volei').value) || 0;
            const brutoMes = gamil + volei + (window.totalP || 0) + (window.totalE || 0);
            const gastosMes = window.totalG || 0;
            const dizimoMes = brutoMes * 0.10;
            
            // Saldo Final Consolidado = Saldo Anterior + Ganhos Mês - Gastos Mês - Dízimo Mês
            const saldoGeral = (window.saldoAnterior || 0) + brutoMes - gastosMes - dizimoMes;

            document.getElementById('top-ganhos').innerText = fmt(brutoMes);
            document.getElementById('top-gastos').innerText = fmt(gastosMes);
            document.getElementById('top-saldo').innerText = fmt(saldoGeral);
            document.getElementById('res-dizimo').innerText = fmt(dizimoMes);

            // Cores do Dashboard
            const cardSaldo = document.getElementById('top-card-saldo');
            if (saldoGeral >= 0) {
                cardSaldo.style.borderBottomColor = "#10b981";
                document.getElementById('top-saldo').style.color = "#10b981";
            } else {
                cardSaldo.style.borderBottomColor = "#ef4444";
                document.getElementById('top-saldo').style.color = "#ef4444";
            }
        }
    </script>
</body>
</html>
