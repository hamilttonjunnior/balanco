<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Financeiro - Hamilton</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .active { display: block; }
        .tab-btn.active-btn { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div id="login-screen" class="fixed inset-0 bg-black flex items-center justify-center z-50">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700 w-80 text-center">
            <h2 class="text-xl font-bold mb-6">Acesso Privado</h2>
            <input type="password" id="senha" class="w-full p-3 bg-gray-700 rounded-lg mb-4 text-center border border-gray-600 focus:border-blue-500 outline-none" placeholder="Senha">
            <button onclick="login()" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition shadow-lg">Entrar</button>
        </div>
    </div>

    <div id="main-content" class="hidden max-w-lg mx-auto p-4 pb-24">
        <header class="py-6 flex justify-between items-center border-b border-gray-800 mb-4">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">Livro de Ponto</h1>
                <p class="text-xs text-gray-500">Hamilton Junior</p>
            </div>
            <div class="text-right">
                <span class="text-xs text-gray-400 block uppercase">Valor/Hora</span>
                <span class="text-lg font-mono text-green-400">€ <span id="vh-val">0.00</span></span>
            </div>
        </header>

        <nav class="flex justify-between border-b border-gray-700 mb-6 text-sm">
            <button onclick="showTab('pearson')" class="tab-btn active-btn pb-2 px-2 transition">Pearson</button>
            <button onclick="showTab('rendas')" class="tab-btn pb-2 px-2 transition">Rendas</button>
            <button onclick="showTab('gastos')" class="tab-btn pb-2 px-2 transition">Gastos</button>
            <button onclick="showTab('resumo')" class="tab-btn pb-2 px-2 transition uppercase font-bold">Total</button>
        </nav>

        <section id="pearson" class="tab-content active">
            <div class="bg-gray-800 p-5 rounded-xl shadow-lg mb-6 border border-gray-700">
                <h3 class="font-bold mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full"></span> Registrar Horas
                </h3>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] uppercase text-gray-400 ml-1">Data</label>
                        <input type="date" id="p-data" class="bg-gray-700 p-2 rounded-lg text-sm border border-gray-600">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] uppercase text-gray-400 ml-1">Horas</label>
                        <input type="number" id="p-horas" step="0.5" placeholder="Ex: 4.5" class="bg-gray-700 p-2 rounded-lg text-sm border border-gray-600">
                    </div>
                </div>
                <button onclick="salvarPearson()" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition">Adicionar ao Ponto</button>
            </div>

            <h4 class="text-xs font-bold text-gray-500 mb-3 uppercase tracking-widest">Histórico de Lançamentos</h4>
            <div id="lista-ponto" class="space-y-3">
                </div>
        </section>

        <section id="rendas" class="tab-content">
            <div class="bg-gray-800 p-5 rounded-xl space-y-5 border border-gray-700 shadow-lg">
                <div>
                    <label class="text-xs text-gray-400 block mb-1 uppercase">Configurar Valor/Hora Pearson (€)</label>
                    <input type="number" id="cfg-vh" onchange="atualizarVH()" class="w-full bg-gray-700 p-3 rounded-lg border border-gray-600 font-mono text-green-400 text-lg">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-gray-400 block mb-1 uppercase text-blue-400">Gamil (€)</label>
                        <input type="number" id="in-gamil" class="w-full bg-gray-700 p-3 rounded-lg border border-gray-600 font-mono">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 block mb-1 uppercase text-orange-400">Vôlei (€)</label>
                        <input type="number" id="in-volei" class="w-full bg-gray-700 p-3 rounded-lg border border-gray-600 font-mono">
                    </div>
                </div>
                <div class="border-t border-gray-700 pt-4">
                    <label class="text-xs text-gray-400 block mb-2 uppercase italic">Extras (Clique no + para cada entrada)</label>
                    <div class="flex gap-2">
                        <input type="number" id="in-extra" class="flex-1 bg-gray-700 p-3 rounded-lg border border-gray-600 font-mono" placeholder="0.00">
                        <button onclick="addExtra()" class="bg-green-600 px-6 rounded-lg font-bold text-xl hover:bg-green-500 transition">+</button>
                    </div>
                    <div id="lista-extras" class="mt-4 p-3 bg-gray-900 rounded-lg text-sm text-blue-300 font-mono">
                        Aguardando dados...
                    </div>
                </div>
            </div>
        </section>

        <section id="gastos" class="tab-content">
            <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg">
                <h3 class="font-bold mb-4">Registar Gasto</h3>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="g-desc" placeholder="Ex: Renda" class="flex-1 bg-gray-700 p-3 rounded-lg border border-gray-600">
                    <input type="number" id="g-val" placeholder="€" class="w-24 bg-gray-700 p-3 rounded-lg border border-gray-600 font-mono">
                    <button onclick="addGasto()" class="bg-red-600 px-4 rounded-lg font-bold hover:bg-red-500 transition">Add</button>
                </div>
                <div id="lista-gastos" class="space-y-2">
                    </div>
            </div>
        </section>

        <section id="resumo" class="tab-content">
            <div class="grid grid-cols-1 gap-4">
                <div class="bg-gray-800 p-6 rounded-2xl border-l-8 border-blue-500 shadow-xl">
                    <p class="text-xs text-gray-400 uppercase font-bold tracking-widest">Ganhos Totais (Bruto)</p>
                    <h2 id="res-bruto" class="text-4xl font-mono font-bold mt-2">€ 0.00</h2>
                </div>
                <div class="bg-gray-800 p-6 rounded-2xl border-l-8 border-yellow-500 shadow-xl">
                    <p class="text-xs text-gray-400 uppercase font-bold tracking-widest text-yellow-500">Dízimo (10%)</p>
                    <h2 id="res-dizimo" class="text-3xl font-mono font-bold mt-2 text-yellow-500">€ 0.00</h2>
                </div>
                <div class="bg-green-900 p-6 rounded-2xl border-l-8 border-green-400 shadow-xl">
                    <p class="text-xs text-green-300 uppercase font-bold tracking-widest">Saldo Real (Líquido)</p>
                    <h2 id="res-liquido" class="text-4xl font-mono font-bold mt-2 text-green-100">€ 0.00</h2>
                </div>
                <p class="text-[10px] text-gray-500 text-center mt-4 italic">Cálculo: (Pearson + Gamil + Vôlei + Extras) - Dízimo - Gastos</p>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURAÇÃO VINDA DA TUA IMAGEM
        const firebaseConfig = {
            apiKey: "AIzaSyA7nFxZzTDpLLGZZPmey_kt5Y_AYrWBgt8",
            authDomain: "balanco-3160d.firebaseapp.com",
            projectId: "balanco-3160d",
            storageBucket: "balanco-3160d.firebasestorage.app",
            messagingSenderId: "191125931303",
            appId: "1:191125931303:web:4b1615a83d648c96151502"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LOGIN E NAVEGAÇÃO
        window.login = () => {
            const senhaDigitada = document.getElementById('senha').value;
            if(senhaDigitada === 'hamilton2026') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                carregarDadosIniciais();
            } else {
                alert("Senha incorreta!");
            }
        };

        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-btn'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active-btn');
            calcularTudo();
        };

        // LÓGICA DE DATAS DE PAGAMENTO (PEARSON)
        window.calcularPagamento = (dataStr) => {
            const data = new Date(dataStr);
            const dia = data.getUTCDate();
            const mes = data.getUTCMonth();
            const ano = data.getUTCFullYear();

            // Regra: 11 a 25 recebe no dia 10 do mês seguinte
            if (dia >= 11 && dia <= 25) {
                const mesRec = (mes + 1) % 12;
                const anoRec = mes === 11 ? ano + 1 : ano;
                return { label: `Recebe 10/${String(mesRec + 1).padStart(2, '0')}`, cor: "blue" };
            } 
            // Regra: 26 a 10 recebe no dia 25 (ou deste mês se for dia < 10, ou do próximo se for dia > 26)
            else {
                let mesRec = (dia >= 26) ? (mes + 1) % 12 : mes;
                let anoRec = (dia >= 26 && mes === 11) ? ano + 1 : ano;
                return { label: `Recebe 25/${String(mesRec + 1).padStart(2, '0')}`, cor: "purple" };
            }
        };

        // SALVAR DADOS
        window.salvarPearson = async () => {
            const data = document.getElementById('p-data').value;
            const horas = parseFloat(document.getElementById('p-horas').value);
            const vh = parseFloat(localStorage.getItem('vh')) || 0;
            
            if(!data || isNaN(horas)) return alert("Preencha data e horas!");

            const info = calcularPagamento(data);

            try {
                await addDoc(collection(db, "pearson"), {
                    data,
                    horas,
                    previsao: info.label,
                    cor: info.cor,
                    valorDia: horas * vh,
                    createdAt: new Date()
                });
                document.getElementById('p-horas').value = '';
            } catch (e) { alert("Erro ao salvar: " + e); }
        };

        window.addExtra = async () => {
            const valor = parseFloat(document.getElementById('in-extra').value);
            if(isNaN(valor)) return;
            await addDoc(collection(db, "extras"), { valor, data: new Date() });
            document.getElementById('in-extra').value = '';
        };

        window.addGasto = async () => {
            const desc = document.getElementById('g-desc').value;
            const val = parseFloat(document.getElementById('g-val').value);
            if(desc && !isNaN(val)) {
                await addDoc(collection(db, "gastos"), { desc, val });
                document.getElementById('g-desc').value = '';
                document.getElementById('g-val').value = '';
            }
        };

        window.atualizarVH = () => {
            const v = document.getElementById('cfg-vh').value;
            localStorage.setItem('vh', v);
            document.getElementById('vh-val').innerText = parseFloat(v).toFixed(2);
            calcularTudo();
        };

        window.removerItem = async (colecao, id) => {
            if(confirm("Deseja apagar este registo?")) {
                await deleteDoc(doc(db, colecao, id));
            }
        };

        // ESCUTAR DADOS EM TEMPO REAL
        function carregarDadosIniciais() {
            const vhSalvo = localStorage.getItem('vh') || "15.75";
            document.getElementById('cfg-vh').value = vhSalvo;
            document.getElementById('vh-val').innerText = parseFloat(vhSalvo).toFixed(2);

            // Ouvir Pearson
            onSnapshot(query(collection(db, "pearson"), orderBy("data", "desc")), (snap) => {
                let html = '';
                let totalH = 0;
                let vh = parseFloat(localStorage.getItem('vh')) || 0;
                
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    const totalDia = d.horas * vh;
                    totalH += d.horas;
                    html += `
                    <div class="bg-gray-800 p-3 rounded-lg flex justify-between items-center border-l-4 border-${d.cor}-500 shadow-sm">
                        <div>
                            <p class="text-[10px] text-gray-500 uppercase">${d.data}</p>
                            <p class="text-sm font-bold">${d.horas} horas <span class="text-[10px] font-normal text-gray-400 ml-2">(${d.previsao})</span></p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-mono text-green-400 font-bold text-sm">€ ${totalDia.toFixed(2)}</span>
                            <button onclick="removerItem('pearson', '${docSnap.id}')" class="text-gray-600 hover:text-red-500 text-xs">✕</button>
                        </div>
                    </div>`;
                });
                document.getElementById('lista-ponto').innerHTML = html || '<p class="text-center text-gray-600 py-4">Sem registos.</p>';
                window.totalPearson = totalH * vh;
                calcularTudo();
            });

            // Ouvir Extras
            onSnapshot(collection(db, "extras"), (snap) => {
                let totalEx = 0;
                snap.forEach(d => totalEx += d.data().valor);
                document.getElementById('lista-extras').innerText = `Acumulado Extras: € ${totalEx.toFixed(2)}`;
                window.totalExtras = totalEx;
                calcularTudo();
            });

            // Ouvir Gastos
            onSnapshot(collection(db, "gastos"), (snap) => {
                let html = ''; let totalG = 0;
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    totalG += d.val;
                    html += `
                    <div class="flex justify-between bg-gray-700 p-3 rounded-lg text-sm items-center">
                        <span class="text-gray-300">${d.desc}</span>
                        <div class="flex gap-4 items-center">
                            <span class="font-mono font-bold">€ ${d.val.toFixed(2)}</span>
                            <button onclick="removerItem('gastos', '${docSnap.id}')" class="text-gray-500">✕</button>
                        </div>
                    </div>`;
                });
                document.getElementById('lista-gastos').innerHTML = html || '<p class="text-center text-gray-600 py-2">Sem gastos.</p>';
                window.totalGastos = totalG;
                calcularTudo();
            });
        }

        function calcularTudo() {
            const gamil = parseFloat(document.getElementById('in-gamil').value) || 0;
            const volei = parseFloat(document.getElementById('in-volei').value) || 0;
            const pearson = window.totalPearson || 0;
            const extras = window.totalExtras || 0;
            const gastos = window.totalGastos || 0;

            const bruto = gamil + volei + pearson + extras;
            const dizimo = bruto * 0.10;
            const liquido = bruto - dizimo - gastos;

            document.getElementById('res-bruto').innerText = `€ ${bruto.toFixed(2)}`;
            document.getElementById('res-dizimo').innerText = `€ ${dizimo.toFixed(2)}`;
            document.getElementById('res-liquido').innerText = `€ ${liquido.toFixed(2)}`;
        }

        // Listeners para inputs de texto direto
        document.getElementById('in-gamil').addEventListener('input', calcularTudo);
        document.getElementById('in-volei').addEventListener('input', calcularTudo);

    </script>
</body>
</html>
