<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamilton - Extrato Dinâmico v7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .active { display: block; }
        .tab-btn.active-btn { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div id="login-screen" class="fixed inset-0 bg-black flex items-center justify-center z-50">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-80 text-center">
            <h2 class="text-xl font-bold mb-6 text-blue-400">Hamilton Junior</h2>
            <input type="password" id="senha" class="w-full p-3 bg-slate-700 rounded-lg mb-4 text-center border border-slate-600 outline-none" placeholder="Senha">
            <button onclick="login()" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition shadow-lg">Entrar no Banco</button>
        </div>
    </div>

    <div id="main-content" class="hidden max-w-xl mx-auto p-4 pb-24">
        
        <header class="py-4 border-b border-slate-800 sticky top-0 bg-slate-900 z-10">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold text-blue-400">Fluxo de Caixa</h1>
                <input type="month" id="filtro-mes" onchange="trocarMes()" class="bg-slate-800 p-2 rounded-lg text-sm font-bold border border-slate-700">
            </div>
            
            <div class="grid grid-cols-3 gap-2">
                <div class="bg-slate-800 p-2 rounded-lg border-b-2 border-emerald-500">
                    <p class="text-[8px] uppercase text-slate-400">Entradas</p>
                    <p id="top-ganhos" class="text-xs font-mono font-bold text-emerald-400">0.00 €</p>
                </div>
                <div class="bg-slate-800 p-2 rounded-lg border-b-2 border-red-500">
                    <p class="text-[8px] uppercase text-slate-400">Saídas</p>
                    <p id="top-gastos" class="text-xs font-mono font-bold text-red-400">0.00 €</p>
                </div>
                <div id="top-card-saldo" class="bg-slate-800 p-2 rounded-lg border-b-2 border-blue-500 transition-all">
                    <p class="text-[8px] uppercase text-slate-400">Saldo Atual</p>
                    <p id="top-saldo" class="text-xs font-mono font-bold">0.00 €</p>
                </div>
            </div>
        </header>

        <nav class="flex justify-between border-b border-slate-700 my-6 text-[10px] uppercase font-bold tracking-widest overflow-x-auto gap-4">
            <button onclick="showTab('pearson')" class="tab-btn active-btn pb-2 px-1">Pearson</button>
            <button onclick="showTab('rendas')" class="tab-btn pb-2 px-1">Gamil/Vôlei</button>
            <button onclick="showTab('gastos')" class="tab-btn pb-2 px-1">Despesas</button>
            <button onclick="showTab('resumo')" class="tab-btn pb-2 px-1">Balanço</button>
        </nav>

        <section id="pearson" class="tab-content active">
            <div class="bg-slate-800 p-5 rounded-2xl mb-6 border border-slate-700">
                <div class="grid grid-cols-2 gap-3 mb-4 text-xs">
                    <div><label>Dia trabalhado:</label><input type="date" id="p-data" class="bg-slate-700 p-2 rounded-lg w-full mt-1"></div>
                    <div><label>Horas:</label><input type="number" id="p-horas" step="0.5" class="bg-slate-700 p-2 rounded-lg w-full mt-1"></div>
                </div>
                <button onclick="salvarPearson()" class="w-full bg-blue-600 py-2 rounded-lg font-bold">Lançar Ponto</button>
            </div>
            <div id="lista-ponto" class="space-y-3"></div>
        </section>

        <section id="rendas" class="tab-content">
            <div class="bg-slate-800 p-5 rounded-2xl space-y-4 border border-slate-700">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] uppercase">Gamil</label><input type="number" id="in-gamil" onblur="salvarRendaFixa()" class="w-full bg-slate-700 p-3 rounded-lg border border-slate-600 font-mono text-blue-400"></div>
                    <div><label class="text-[10px] uppercase">Vôlei</label><input type="number" id="in-volei" onblur="salvarRendaFixa()" class="w-full bg-slate-700 p-3 rounded-lg border border-slate-600 font-mono text-orange-400"></div>
                </div>
                <div class="border-t border-slate-700 pt-4">
                    <label class="text-[10px] uppercase block mb-2 font-bold">Extras (+)</label>
                    <div class="flex gap-2">
                        <input type="number" id="in-extra" class="flex-1 bg-slate-700 p-3 rounded-lg border border-slate-600 font-mono" placeholder="Valor €">
                        <button onclick="addExtra()" class="bg-green-600 px-6 rounded-lg font-bold">+</button>
                    </div>
                    <div id="lista-extras" class="mt-4 p-3 bg-slate-900 rounded-xl text-xs text-blue-300 font-mono space-y-2"></div>
                </div>
            </div>
        </section>

        <section id="gastos" class="tab-content">
            <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-xl">
                <div class="flex flex-col gap-3 mb-6 text-xs">
                    <input type="text" id="g-desc" placeholder="O que pagou?" class="bg-slate-700 p-3 rounded-lg">
                    <div class="flex gap-2 font-bold">
                        <input type="number" id="g-val" placeholder="€" class="flex-1 bg-slate-700 p-3 rounded-lg">
                        <button onclick="addGasto()" class="bg-red-600 px-6 rounded-lg">Add</button>
                    </div>
                </div>
                <div id="lista-gastos" class="space-y-2"></div>
            </div>
        </section>

        <section id="resumo" class="tab-content">
            <div class="space-y-4">
                <div class="bg-slate-800 p-6 rounded-2xl border-l-8 border-yellow-500">
                    <p class="text-[10px] text-yellow-500 uppercase font-bold tracking-widest">Reserva Dízimo (10%)</p>
                    <h2 id="res-dizimo" class="text-3xl font-mono font-bold mt-2 text-yellow-500">0.00 €</h2>
                </div>
                <div class="bg-slate-800 p-6 rounded-2xl border-l-8 border-slate-500">
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Saldo do Mês Anterior</p>
                    <h2 id="res-anterior" class="text-xl font-mono font-bold mt-2">0.00 €</h2>
                </div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, deleteDoc, doc, setDoc, getDoc, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA7nFxZzTDpLLGZZPmey_kt5Y_AYrWBgt8",
            authDomain: "balanco-3160d.firebaseapp.com",
            projectId: "balanco-3160d",
            storageBucket: "balanco-3160d.firebasestorage.app",
            messagingSenderId: "191125931303",
            appId: "1:191125931303:web:4b1615a83d648c96151502"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.login = () => {
            if(document.getElementById('senha').value === 'hamilton2026') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                const agora = new Date();
                document.getElementById('filtro-mes').value = agora.toISOString().substring(0, 7);
                trocarMes();
            }
        };

        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-btn'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active-btn');
        };

        let unsubs = [];
        window.trocarMes = async () => {
            unsubs.forEach(u => u()); unsubs = [];
            const mesAtual = document.getElementById('filtro-mes').value;
            
            // BUSCAR SALDO DO MÊS ANTERIOR (A LÓGICA ACUMULATIVA)
            await calcularSaldoAnterior(mesAtual);
            carregarDados(mesAtual);
        };

        const fmt = (v) => new Intl.NumberFormat('pt-PT', { style: 'currency', currency: 'EUR' }).format(v);

        // LÓGICA DE SALDO ACUMULADO
        async function calcularSaldoAnterior(mesFiltro) {
            const vh = parseFloat(localStorage.getItem('vh')) || 15.75;
            let totalAcumulado = 0;

            // Busca TODOS os documentos criados ANTES do mês selecionado
            const todasRendas = await getDocs(collection(db, "rendas_fixas"));
            todasRendas.forEach(d => { if(d.id < mesFiltro) totalAcumulado += (d.data().gamil + d.data().volei); });

            const todasPearson = await getDocs(collection(db, "pearson"));
            todasPearson.forEach(d => { if(d.data().mesRef < mesFiltro) totalAcumulado += (d.data().horas * vh); });

            const todosExtras = await getDocs(collection(db, "extras"));
            todosExtras.forEach(d => { if(d.data().mesRef < mesFiltro) totalAcumulado += d.data().valor; });

            const todosGastos = await getDocs(collection(db, "gastos"));
            todosGastos.forEach(d => { if(d.data().mesRef < mesFiltro) totalAcumulado -= d.data().val; });

            // Deduz 10% de dízimo do acumulado bruto para o saldo ser real
            // (Assumindo que o dízimo é uma saída de caixa)
            window.saldoAnterior = totalAcumulado * 0.90; 
            document.getElementById('res-anterior').innerText = fmt(window.saldoAnterior);
        }

        window.salvarPearson = async () => {
            const dStr = document.getElementById('p-data').value;
            const h = parseFloat(document.getElementById('p-horas').value);
            if(!dStr || isNaN(h)) return;
            const d = new Date(dStr);
            const dia = d.getUTCDate();
            let mR = d.getUTCMonth(); let aR = d.getUTCFullYear();
            if (dia >= 11) mR += 1; // 11 a 25 recebe mes seguinte, 26 a 31 recebe mes seguinte
            if (mR > 11) { mR = 0; aR += 1; }
            const mesRef = `${aR}-${String(mR + 1).padStart(2, '0')}`;
            await addDoc(collection(db, "pearson"), { dataTrab: dStr, horas: h, mesRef, ano: String(aR) });
            document.getElementById('p-horas').value = '';
        };

        window.salvarRendaFixa = async () => {
            const mes = document.getElementById('filtro-mes').value;
            const gamil = parseFloat(document.getElementById('in-gamil').value) || 0;
            const volei = parseFloat(document.getElementById('in-volei').value) || 0;
            await setDoc(doc(db, "rendas_fixas", mes), { gamil, volei });
            calcularTudo();
        };

        window.addExtra = async () => {
            const mes = document.getElementById('filtro-mes').value;
            const val = parseFloat(document.getElementById('in-extra').value);
            if(!isNaN(val)) {
                await addDoc(collection(db, "extras"), { valor: val, mesRef: mes });
                document.getElementById('in-extra').value = '';
            }
        };

        window.addGasto = async () => {
            const mes = document.getElementById('filtro-mes').value;
            const desc = document.getElementById('g-desc').value;
            const val = parseFloat(document.getElementById('g-val').value);
            if(desc && !isNaN(val)) {
                await addDoc(collection(db, "gastos"), { desc, val, mesRef: mes });
                document.getElementById('g-desc').value = ''; document.getElementById('g-val').value = '';
            }
        };

        function carregarDados(mes) {
            const vh = parseFloat(localStorage.getItem('vh')) || 15.75;
            getDoc(doc(db, "rendas_fixas", mes)).then(s => {
                document.getElementById('in-gamil').value = s.exists() ? s.data().gamil : 0;
                document.getElementById('in-volei').value = s.exists() ? s.data().volei : 0;
                calcularTudo();
            });

            unsubs.push(onSnapshot(query(collection(db, "pearson"), where("mesRef", "==", mes)), (snap) => {
                let h = '', total = 0;
                snap.forEach(d => { total += (d.data().horas * vh); h += `<div class="bg-slate-800 p-2 rounded border border-slate-700 text-[10px] flex justify-between"><span>${d.data().dataTrab}</span><span class="font-bold text-emerald-400">€ ${(d.data().horas * vh).toFixed(2)}</span></div>`; });
                document.getElementById('lista-ponto').innerHTML = h; window.totalP = total; calcularTudo();
            }));

            unsubs.push(onSnapshot(query(collection(db, "extras"), where("mesRef", "==", mes)), (snap) => {
                let total = 0; snap.forEach(d => total += d.data().valor);
                window.totalE = total; calcularTudo();
            }));

            unsubs.push(onSnapshot(query(collection(db, "gastos"), where("mesRef", "==", mes)), (snap) => {
                let h = '', total = 0;
                snap.forEach(d => { total += d.data().val; h += `<div class="bg-slate-700/30 p-2 rounded flex justify-between text-[10px]"><span>${d.data().desc}</span><span class="text-red-400 font-bold">${fmt(d.data().val)}</span></div>`; });
                document.getElementById('lista-gastos').innerHTML = h; window.totalG = total; calcularTudo();
            }));
        }

        window.remover = async (col, id) => { if(confirm("Remover?")) await deleteDoc(doc(db, col, id)); };

        function calcularTudo() {
            const gamil = parseFloat(document.getElementById('in-gamil').value) || 0;
            const volei = parseFloat(document.getElementById('in-volei').value) || 0;
            const brutoMes = gamil + volei + (window.totalP || 0) + (window.totalE || 0);
            const gastosMes = window.totalG || 0;
            const dizimoMes = brutoMes * 0.10;
            
            // SALDO FINAL = Saldo Anterior + Ganhos - Gastos - Dízimo
            const saldoFinal = (window.saldoAnterior || 0) + brutoMes - gastosMes - dizimoMes;

            document.getElementById('top-ganhos').innerText = fmt(brutoMes);
            document.getElementById('top-gastos').innerText = fmt(gastosMes);
            document.getElementById('top-saldo').innerText = fmt(saldoFinal);
            document.getElementById('res-dizimo').innerText = fmt(dizimoMes);

            const card = document.getElementById('top-card-saldo');
            if(saldoFinal >= 0) {
                card.style.borderBottomColor = "#10b981";
                document.getElementById('top-saldo').style.color = "#10b981";
            } else {
                card.style.borderBottomColor = "#ef4444";
                document.getElementById('top-saldo').style.color = "#ef4444";
            }
        }
    </script>
</body>
</html>
