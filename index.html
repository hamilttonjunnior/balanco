<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro Hamilton - Fluxo Mensal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .active { display: block; }
        .tab-btn.active-btn { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div id="login-screen" class="fixed inset-0 bg-black flex items-center justify-center z-50">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700 w-80 text-center">
            <h2 class="text-xl font-bold mb-6">Acesso Privado</h2>
            <input type="password" id="senha" class="w-full p-3 bg-gray-700 rounded-lg mb-4 text-center border border-gray-600 outline-none" placeholder="Senha">
            <button onclick="login()" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition shadow-lg">Entrar</button>
        </div>
    </div>

    <div id="main-content" class="hidden max-w-lg mx-auto p-4 pb-24">
        <header class="py-6 flex justify-between items-center border-b border-gray-800 mb-4">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">Meu Extrato</h1>
                <input type="month" id="filtro-mes" onchange="trocarMes()" class="bg-transparent text-sm text-gray-400 outline-none cursor-pointer">
            </div>
            <div class="text-right">
                <span class="text-xs text-gray-400 block uppercase">Valor/Hora</span>
                <span class="text-lg font-mono text-green-400">€ <span id="vh-val">0.00</span></span>
            </div>
        </header>

        <nav class="flex justify-between border-b border-gray-700 mb-6 text-sm">
            <button onclick="showTab('pearson')" class="tab-btn active-btn pb-2 px-2">Pearson</button>
            <button onclick="showTab('rendas')" class="tab-btn pb-2 px-2">Entradas</button>
            <button onclick="showTab('gastos')" class="tab-btn pb-2 px-2">Gastos</button>
            <button onclick="showTab('resumo')" class="tab-btn pb-2 px-2 uppercase font-bold">Balanço</button>
        </nav>

        <section id="pearson" class="tab-content active">
            <div class="bg-gray-800 p-5 rounded-xl mb-6 border border-gray-700">
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input type="date" id="p-data" class="bg-gray-700 p-2 rounded-lg text-sm border border-gray-600">
                    <input type="number" id="p-horas" step="0.5" placeholder="Horas" class="bg-gray-700 p-2 rounded-lg text-sm border border-gray-600">
                </div>
                <button onclick="salvarPearson()" class="w-full bg-blue-600 py-2 rounded-lg font-bold">Lançar Horas</button>
            </div>
            <div id="lista-ponto" class="space-y-3"></div>
        </section>

        <section id="rendas" class="tab-content">
            <div class="bg-gray-800 p-5 rounded-xl space-y-4 border border-gray-700">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-gray-400 uppercase">Gamil (Dia 30)</label>
                        <input type="number" id="in-gamil" onchange="salvarRendaFixa()" class="w-full bg-gray-700 p-2 rounded border border-gray-600 font-mono">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400 uppercase">Vôlei (Dia 28)</label>
                        <input type="number" id="in-volei" onchange="salvarRendaFixa()" class="w-full bg-gray-700 p-2 rounded border border-gray-600 font-mono">
                    </div>
                </div>
                <div class="border-t border-gray-700 pt-4">
                    <label class="text-[10px] text-gray-400 uppercase block mb-2">Adicionar Extras (+)</label>
                    <div class="flex gap-2">
                        <input type="number" id="in-extra" class="flex-1 bg-gray-700 p-2 rounded border border-gray-600" placeholder="€">
                        <button onclick="addExtra()" class="bg-green-600 px-4 rounded font-bold">+</button>
                    </div>
                    <div id="lista-extras" class="mt-3 space-y-1 text-xs text-blue-300 font-mono"></div>
                </div>
                <div class="border-t border-gray-700 pt-2">
                    <label class="text-[10px] text-gray-400 uppercase">Ajustar Valor/Hora</label>
                    <input type="number" id="cfg-vh" onchange="atualizarVH()" class="w-full bg-transparent border-none text-green-400 font-bold">
                </div>
            </div>
        </section>

        <section id="gastos" class="tab-content">
            <div class="bg-gray-800 p-5 rounded-xl border border-gray-700">
                <div class="flex gap-2 mb-6">
                    <input type="text" id="g-desc" placeholder="Conta" class="flex-1 bg-gray-700 p-2 rounded border border-gray-600">
                    <input type="number" id="g-val" placeholder="€" class="w-20 bg-gray-700 p-2 rounded border border-gray-600">
                    <button onclick="addGasto()" class="bg-red-600 px-4 rounded font-bold">Add</button>
                </div>
                <div id="lista-gastos" class="space-y-2"></div>
            </div>
        </section>

        <section id="resumo" class="tab-content">
            <div class="space-y-4">
                <div class="bg-gray-800 p-5 rounded-2xl border-l-8 border-blue-500">
                    <p class="text-[10px] text-gray-400 uppercase">Entradas Acumuladas</p>
                    <h2 id="res-bruto" class="text-3xl font-mono font-bold">€ 0.00</h2>
                </div>
                <div class="bg-gray-800 p-5 rounded-2xl border-l-8 border-yellow-500 text-yellow-500">
                    <p class="text-[10px] uppercase">Dízimo (10%)</p>
                    <h2 id="res-dizimo" class="text-2xl font-mono font-bold">€ 0.00</h2>
                </div>
                <div class="bg-green-900 p-5 rounded-2xl border-l-8 border-green-400">
                    <p class="text-[10px] text-green-300 uppercase">Saldo Livre para Economizar</p>
                    <h2 id="res-liquido" class="text-3xl font-mono font-bold text-green-100">€ 0.00</h2>
                </div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA7nFxZzTDpLLGZZPmey_kt5Y_AYrWBgt8",
            authDomain: "balanco-3160d.firebaseapp.com",
            projectId: "balanco-3160d",
            storageBucket: "balanco-3160d.firebasestorage.app",
            messagingSenderId: "191125931303",
            appId: "1:191125931303:web:4b1615a83d648c96151502"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- INICIALIZAÇÃO ---
        window.onload = () => {
            const agora = new Date();
            const mesAno = agora.toISOString().substring(0, 7);
            document.getElementById('filtro-mes').value = mesAno;
        };

        window.login = () => {
            if(document.getElementById('senha').value === 'hamilton2026') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                trocarMes();
            }
        };

        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-btn'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active-btn');
        };

        // --- LÓGICA DE MESES ---
        let unsubs = [];
        window.trocarMes = () => {
            const mes = document.getElementById('filtro-mes').value;
            unsubs.forEach(u => u()); // Limpa escutas anteriores
            unsubs = [];
            carregarDados(mes);
        };

        // --- SALVAR DADOS ---
        window.salvarPearson = async () => {
            const data = document.getElementById('p-data').value;
            const horas = parseFloat(document.getElementById('p-horas').value);
            const mesRef = data.substring(0, 7);
            if(!data || isNaN(horas)) return;

            const dia = new Date(data).getUTCDate();
            const previsao = (dia >= 11 && dia <= 25) ? "Recebe Dia 10" : "Recebe Dia 25";

            await addDoc(collection(db, "pearson"), { data, horas, mesRef, previsao });
            document.getElementById('p-horas').value = '';
        };

        window.salvarRendaFixa = async () => {
            const mes = document.getElementById('filtro-mes').value;
            const gamil = parseFloat(document.getElementById('in-gamil').value) || 0;
            const volei = parseFloat(document.getElementById('in-volei').value) || 0;
            await setDoc(doc(db, "rendas_fixas", mes), { gamil, volei });
        };

        window.addExtra = async () => {
            const mes = document.getElementById('filtro-mes').value;
            const valor = parseFloat(document.getElementById('in-extra').value);
            if(!isNaN(valor)) {
                await addDoc(collection(db, "extras"), { valor, mesRef: mes, data: new Date() });
                document.getElementById('in-extra').value = '';
            }
        };

        window.addGasto = async () => {
            const mes = document.getElementById('filtro-mes').value;
            const desc = document.getElementById('g-desc').value;
            const val = parseFloat(document.getElementById('g-val').value);
            if(desc && !isNaN(val)) {
                await addDoc(collection(db, "gastos"), { desc, val, mesRef: mes });
                document.getElementById('g-desc').value = '';
                document.getElementById('g-val').value = '';
            }
        };

        // --- CARREGAR E CALCULAR ---
        function carregarDados(mes) {
            const vh = parseFloat(localStorage.getItem('vh')) || 15.75;
            document.getElementById('vh-val').innerText = vh.toFixed(2);
            document.getElementById('cfg-vh').value = vh;

            // Rendas Fixas (Gamil e Vôlei) do mês
            getDoc(doc(db, "rendas_fixas", mes)).then(s => {
                if(s.exists()) {
                    document.getElementById('in-gamil').value = s.data().gamil;
                    document.getElementById('in-volei').value = s.data().volei;
                } else {
                    document.getElementById('in-gamil').value = 0;
                    document.getElementById('in-volei').value = 0;
                }
                calcularTudo();
            });

            // Pearson
            const qP = query(collection(db, "pearson"), where("mesRef", "==", mes));
            unsubs.push(onSnapshot(qP, (snap) => {
                let h = '', total = 0;
                snap.forEach(d => {
                    const data = d.data();
                    const sub = data.horas * vh;
                    total += sub;
                    h += `<div class="bg-gray-800 p-3 rounded-lg flex justify-between border-l-4 ${data.previsao.includes('10')?'border-blue-500':'border-purple-500'}">
                        <span class="text-xs">${data.data} (${data.horas}h)</span>
                        <div class="flex gap-3 items-center">
                            <span class="font-bold text-green-400 text-sm">€ ${sub.toFixed(2)}</span>
                            <button onclick="remover('pearson','${d.id}')" class="text-gray-600">✕</button>
                        </div>
                    </div>`;
                });
                document.getElementById('lista-ponto').innerHTML = h;
                window.totalP = total;
                calcularTudo();
            }));

            // Extras
            const qE = query(collection(db, "extras"), where("mesRef", "==", mes));
            unsubs.push(onSnapshot(qE, (snap) => {
                let h = '', total = 0;
                snap.forEach(d => {
                    total += d.data().valor;
                    h += `<div>+ € ${d.data().valor.toFixed(2)} <button onclick="remover('extras','${d.id}')">✕</button></div>`;
                });
                document.getElementById('lista-extras').innerHTML = h;
                window.totalE = total;
                calcularTudo();
            }));

            // Gastos
            const qG = query(collection(db, "gastos"), where("mesRef", "==", mes));
            unsubs.push(onSnapshot(qG, (snap) => {
                let h = '', total = 0;
                snap.forEach(d => {
                    total += d.data().val;
                    h += `<div class="bg-gray-700 p-2 rounded flex justify-between text-sm">
                        <span>${d.data().desc}</span>
                        <div class="flex gap-3"><span>€ ${d.data().val.toFixed(2)}</span><button onclick="remover('gastos','${d.id}')">✕</button></div>
                    </div>`;
                });
                document.getElementById('lista-gastos').innerHTML = h;
                window.totalG = total;
                calcularTudo();
            }));
        }

        window.remover = async (col, id) => { if(confirm("Apagar?")) await deleteDoc(doc(db, col, id)); };

        window.atualizarVH = () => {
            localStorage.setItem('vh', document.getElementById('cfg-vh').value);
            trocarMes();
        };

        function calcularTudo() {
            const gamil = parseFloat(document.getElementById('in-gamil').value) || 0;
            const volei = parseFloat(document.getElementById('in-volei').value) || 0;
            const p = window.totalP || 0;
            const e = window.totalE || 0;
            const g = window.totalG || 0;

            const bruto = gamil + volei + p + e;
            const dizimo = bruto * 0.10;
            const liq = bruto - dizimo - g;

            document.getElementById('res-bruto').innerText = `€ ${bruto.toFixed(2)}`;
            document.getElementById('res-dizimo').innerText = `€ ${dizimo.toFixed(2)}`;
            document.getElementById('res-liquido').innerText = `€ ${liq.toFixed(2)}`;
        }
    </script>
</body>
</html>
